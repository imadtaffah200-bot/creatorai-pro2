<!doctype html>
<html lang="ar" dir="rtl">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>توليد الريلز</title><link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"></head>
<body><nav class="شريط"><a class="علامة" href="/"><img src="{{ url_for('static', filename='images/logo.png') }}" alt="الشعار"> مساعد صانع المحتوى العربي</a><button class="زر-قائمة" data-menu>القائمة</button><div class="روابط" data-links><a href="/dashboard">لوحة التحكم</a><a href="/reels">الريلز</a><a href="/thumbnails">الصور المصغرة</a></div></nav><main class="حاوية"><section class="رأس-صفحة"><h1>مولد سكريبتات الريلز</h1><p>اختر اللهجة والمدة واحصل على سكريبت جاهز للتصوير.</p></section><section class="لوحة"><form class="نموذج" data-endpoint="/api/generate/reels-script"><label>موضوع الريلز<input name="topic" required placeholder="عادة صباحية تزيد الإنتاجية"></label><label>اللهجة<select name="dialect"><option>العربية الفصحى</option><option>المغربية</option><option>الخليجية</option><option>المصرية</option><option>الشامية</option></select></label><label>المدة<select name="duration"><option>15 ثانية</option><option>30 ثانية</option><option>45 ثانية</option><option>60 ثانية</option></select></label><button class="زر أساسي" type="submit">توليد السكريبت</button></form><pre class="نتيجة" data-result>سكريبت الريلز سيظهر هنا...</pre></section></main><footer class="تذييل">صنع لصناع المحتوى العرب باستخدام OpenAI و YouTube API.</footer><script src="{{ url_for('static', filename='js/app.js') }}"></script></body></html>
