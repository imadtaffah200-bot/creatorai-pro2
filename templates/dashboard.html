<html lang="ar" dir="rtl">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>لوحة التحكم</title><link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"></head>
<body><nav class="شريط"><a class="علامة" href="/"><img src="{{ url_for('static', filename='images/logo.png') }}" alt="الشعار"> مساعد صانع المحتوى العربي</a><button class="زر-قائمة" data-menu>القائمة</button><div class="روابط" data-links><a href="/dashboard">لوحة التحكم</a><a href="/reels">الريلز</a><a href="/thumbnails">الصور المصغرة</a></div></nav><main class="حاوية"><section class="رأس-صفحة"><h1>لوحة توليد محتوى يوتيوب</h1><p>أدخل موضوع الفيديو والكلمات المفتاحية للحصول على حزمة SEO كاملة.</p></section><section class="لوحة"><form class="نموذج" data-endpoint="/api/generate/youtube-seo"><label>موضوع الفيديو<input name="topic" required placeholder="كيف تبدأ قناة يوتيوب ناجحة"></label><label>الكلمات المفتاحية<textarea name="keywords" placeholder="يوتيوب، صناعة المحتوى، الربح"></textarea></label><label>اللهجة<select name="dialect"><option>العربية الفصحى</option><option>المغربية</option><option>الخليجية</option><option>المصرية</option><option>الشامية</option></select></label><button class="زر أساسي" type="submit">توليد الحزمة</button></form><pre class="نتيجة" data-result>ستظهر النتيجة هنا...</pre></section><section class="لوحة صغيرة"><h2>بحث YouTube API</h2><form class="نموذج أفقي" data-endpoint="/api/youtube/search"><input name="query" required placeholder="ابحث عن منافسين أو أفكار"><button class="زر ثانوي" type="submit">بحث</button></form><pre class="نتيجة" data-result>نتائج البحث ستظهر هنا...</pre></section></main><footer class="تذييل">صنع لصناع المحتوى العرب باستخدام OpenAI و YouTube API.</footer><script src="{{ url_for('static', filename='js/app.js') }}"></script></body></html>
